name: Build Windows Exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Download OpenSSL 1.1.1w (Windows 7 compatible)
      run: |
        # Create directory for bundled DLLs
        New-Item -ItemType Directory -Force -Path "third_party\openssl"
        
        # Download OpenSSL 1.1.1w installer (light version)
        $url = "https://slproweb.com/download/Win64OpenSSL_Light-1_1_1w.exe"
        $installer = "$env:TEMP\openssl_installer.exe"
        Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
        
        # Install silently
        Start-Process -FilePath $installer -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\OpenSSL-1_1_1" -Wait
        
        # DEBUG: Show installed files
        echo "=== OpenSSL Installation Contents ==="
        Get-ChildItem "C:\OpenSSL-1_1_1" -Recurse -Filter "*.dll" | Select-Object FullName
        
        # Copy DLLs to third_party for bundling (DLLs are in bin subfolder)
        Copy-Item "C:\OpenSSL-1_1_1\bin\libssl-1_1-x64.dll" "third_party\openssl\" -ErrorAction SilentlyContinue
        Copy-Item "C:\OpenSSL-1_1_1\bin\libcrypto-1_1-x64.dll" "third_party\openssl\" -ErrorAction SilentlyContinue
        # Fallback: try root folder
        Copy-Item "C:\OpenSSL-1_1_1\libssl-1_1-x64.dll" "third_party\openssl\" -ErrorAction SilentlyContinue
        Copy-Item "C:\OpenSSL-1_1_1\libcrypto-1_1-x64.dll" "third_party\openssl\" -ErrorAction SilentlyContinue
        
        # Add to PATH
        echo "C:\OpenSSL-1_1_1\bin" >> $env:GITHUB_PATH
        
        # Verify
        echo "=== OpenSSL 1.1.1w DLLs for bundling ==="
        Get-ChildItem "third_party\openssl" | Select-Object Name, Length
        
        # Fail if DLLs not found
        if (-not (Test-Path "third_party\openssl\libssl-1_1-x64.dll")) {
          echo "ERROR: libssl-1_1-x64.dll not found!"
          exit 1
        }
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter numpy betfairlightweight telethon requests cryptography cffi
    
    - name: Verify SSL DLLs for bundling
      run: |
        echo "=== OpenSSL 1.1.1w DLLs (Windows 7 compatible) ==="
        Get-ChildItem "third_party\openssl" | Select-Object Name, Length
        echo ""
        echo "These will be bundled into Pickfair.exe by PyInstaller"
    
    - name: Build with PyInstaller
      run: |
        pyinstaller Pickfair.spec --noconfirm
    
    - name: Verify build
      run: |
        if (Test-Path "dist\Pickfair.exe") {
          echo "Build successful!"
          Get-Item "dist\Pickfair.exe" | Select-Object Name, Length
        } else {
          echo "Build failed - exe not found"
          exit 1
        }
    
    - name: Upload to Pickfair public repo
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/Pickfair.exe
        repository: petiro/Pickfair
        token: ${{ secrets.RELEASE_TOKEN }}
    
    - name: Upload artifact (for manual runs)
      uses: actions/upload-artifact@v4
      if: "!startsWith(github.ref, 'refs/tags/')"
      with:
        name: Pickfair-exe
        path: dist/Pickfair.exe
