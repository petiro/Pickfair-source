name: Build
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.7'
    - run: pip install pyinstaller betfairlightweight telethon customtkinter numpy
    - name: Build executable
      working-directory: python-app
      run: pyinstaller --onefile --windowed --name Pickfair main.py --hidden-import=customtkinter
    - name: Upload to public repo
      uses: softprops/action-gh-release@v1
      with:
        files: python-app/dist/Pickfair.exe
        repository: petiro/Pickfair
        token: ${{ secrets.RELEASE_TOKEN }}
