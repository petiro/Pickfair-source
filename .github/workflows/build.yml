name: Build
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: python-app
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pyinstaller betfairlightweight telethon customtkinter numpy matplotlib
    - name: Build executable
      run: pyinstaller --onefile --windowed --name Pickfair main.py --hidden-import=customtkinter --hidden-import=matplotlib
    - name: Upload to Pickfair public repo
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: python-app/dist/Pickfair.exe
        repository: petiro/Pickfair
        token: ${{ secrets.RELEASE_TOKEN }}
